name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + dev extras
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -W error -ra

  build:
    name: build wheel
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: python -m pip install --upgrade build && python -m build
      - name: Verify wheel installs cleanly and templates resolve
        run: |
          python -m venv /tmp/verify
          /tmp/verify/bin/pip install dist/*.whl
          /tmp/verify/bin/python -c "from orchestration.implementations.formatters.gpt_formatter import GPTFormatter; assert GPTFormatter()._get_template() is not None; print('templates resolved from wheel')"
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

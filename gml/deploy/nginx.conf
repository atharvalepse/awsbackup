# nginx config for the GML production deploy.
#
# Layout assumed:
#   * nginx terminates TLS on :443
#   * FastAPI (orchestration.server) runs on 127.0.0.1:8000
#   * FastMCP HTTP transport (orchestration.mcp_server) runs on 127.0.0.1:8765
#
# nginx is NOT doing auth — both upstream servers handle their own
# `X-API-Key` / `Authorization` validation against the same users.jsonl.
# nginx only does TLS, gzip, rate limiting, and routing.
#
# Install:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/gml
#   sudo ln -s /etc/nginx/sites-available/gml /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d gml.example.com   # gets a free Let's Encrypt cert
#   sudo nginx -t && sudo systemctl reload nginx
#
# Replace `gml.example.com` with your actual hostname before deploying.

# Rate limit: 60 requests/min per IP. /api/memory/ingest is hotter; we
# carve a higher allowance for it below. Adjust to your actual traffic.
limit_req_zone $binary_remote_addr zone=gml_api:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=gml_ingest:10m rate=120r/m;

# Map an upstream so we can switch between dev/prod without rewriting paths.
upstream gml_api_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

upstream gml_mcp_backend {
    server 127.0.0.1:8765;
    keepalive 32;
}

# HTTP → HTTPS redirect. Replace the cert acme-challenge block once certbot
# has run for the first time (it'll insert the right lines automatically).
server {
    listen 80;
    listen [::]:80;
    server_name gml.example.com;
    location /.well-known/acme-challenge/ { root /var/www/letsencrypt; }
    location / { return 301 https://$host$request_uri; }
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name gml.example.com;

    # TLS (certbot will write the actual paths; this is the convention)
    ssl_certificate     /etc/letsencrypt/live/gml.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gml.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Decent defaults: gzip, sensible timeouts. SSE/streamable-http needs
    # proxy_buffering off for low latency.
    gzip on;
    gzip_types application/json text/plain text/event-stream;

    client_max_body_size 16M;
    client_body_timeout 60s;
    send_timeout 60s;

    # ----- MCP (streamable-http) -----
    # Long-lived streaming; turn off response buffering so MCP events flow
    # in real time. Forward the X-API-Key header (default upstream behaviour
    # but explicit is good).
    location /mcp {
        proxy_pass http://gml_mcp_backend;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # X-API-Key / Authorization are forwarded automatically.
    }

    # ----- REST API -----
    location /api/memory/ingest {
        limit_req zone=gml_ingest burst=20 nodelay;
        proxy_pass http://gml_api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /api/memory/sdp_ingest {
        limit_req zone=gml_ingest burst=20 nodelay;
        proxy_pass http://gml_api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SSE endpoints — disable buffering.
    location ~ ^/api/memory/(recall|trace)/stream$ {
        limit_req zone=gml_api burst=20 nodelay;
        proxy_pass http://gml_api_backend;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Public/health endpoints — relaxed limit.
    location ~ ^/(health|api/health|metrics|)$ {
        proxy_pass http://gml_api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else under /api/* — rate-limited, normal proxy.
    location /api/ {
        limit_req zone=gml_api burst=30 nodelay;
        proxy_pass http://gml_api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Chat endpoints (longest-running on the orchestration side).
    location /chat {
        limit_req zone=gml_api burst=20 nodelay;
        proxy_pass http://gml_api_backend;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static UI (if the Next.js build is exported into /var/www/gml-ui/).
    # Comment out if you serve the UI from a separate origin (Vercel etc.).
    location / {
        root /var/www/gml-ui;
        try_files $uri $uri.html $uri/index.html /index.html;
        # SPA fallback handled by try_files; cache headers for assets.
        location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
}

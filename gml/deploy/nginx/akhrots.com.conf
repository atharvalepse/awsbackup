# Production nginx site for akhrots.com — the single public entry point.
# Mirrors the live VM (136.113.88.125 — akhrots.com / mcp.akhrots.com). Install as:
#   sudo cp deploy/nginx/akhrots.com.conf /etc/nginx/sites-available/akhrot
#   sudo ln -sf /etc/nginx/sites-available/akhrot /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Routing (everything is consolidated here; mcp.akhrots.com 308s to this host):
#   /                        → Next.js web UI / marketing (127.0.0.1:3000)
#   /app, /app/trace, /login → Next.js dashboard (graph + list + recall + trace)
#   /api/*, /auth/*          → FastAPI orchestration (127.0.0.1:8000)
#   /mcp, /relay/*           → MCP relay (127.0.0.1:8080)
#
# The dashboard is the ONLY visualization surface — FastAPI serves no HTML viz
# pages (no /viz, no /graph). nginx does TLS + routing only; both upstreams do
# their own JWT / X-API-Key auth against the shared GML accounts.
server {
    server_name akhrots.com www.akhrots.com;

    root /var/www/akhrots;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
        # Marketing site is hand-written static HTML (no build hash on the
        # .html), so force revalidation — content edits (e.g. nav changes)
        # show up on a normal reload instead of being served stale from cache.
        add_header Cache-Control "no-cache" always;
    }

    location ~ \.mp4$ {
        mp4;
        mp4_buffer_size 1m;
        mp4_max_buffer_size 5m;
        expires max;
    }


    # --- GML web UI (mounted on akhrots.com; root / stays the marketing site) ---
    location /_next/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /app {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /login {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ~ ^/api/memory/(recall|trace)/stream$ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /auth/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- MCP relay, consolidated onto akhrots.com (mcp.akhrots.com 308s here) ---
    location /mcp {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
    location /relay/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
    # --- end GML web UI ---

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/akhrots.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/akhrots.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}
server {
    if ($host = www.akhrots.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = akhrots.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name akhrots.com www.akhrots.com;
    return 404; # managed by Certbot
}

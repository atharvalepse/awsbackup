# mcp.akhrots.com — legacy subdomain, now consolidated onto akhrots.com.
# Install as:
#   sudo cp deploy/nginx/mcp.akhrots.com.conf /etc/nginx/sites-available/mcp
#   sudo ln -sf /etc/nginx/sites-available/mcp /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# The relay used to be served here directly; it now lives at akhrots.com/mcp.
# This block 308-redirects (preserving method + body, unlike 301/302) so old
# clients keep navigating. CAVEAT: HTTP clients strip the Authorization header
# on cross-host redirects, so MCP clients MUST be reconfigured to point
# directly at https://akhrots.com/mcp — the redirect cannot carry their token.
server {
    server_name mcp.akhrots.com;

    location / {
        return 308 https://akhrots.com$request_uri;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/mcp.akhrots.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/mcp.akhrots.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}
server {
    if ($host = mcp.akhrots.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name mcp.akhrots.com;
    return 404; # managed by Certbot
}
